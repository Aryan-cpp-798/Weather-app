<html>

    <title>Weather App</title>
</head>
<body>
    <h1>Weather App</h1>
    
    <!-- form sends city name to /weather route -->
    <form action="/weather" method="GET">

        <button type="submit">Get Weather</button>
    </form>
</body>
</html>
